name: Newsletter

on:
  push:
    branches: [main]
    paths: ["src/blog/**"]
  workflow_dispatch:
    inputs:
      file:
        description: "Path to a blog post (e.g., src/blog/2026-05-16-foo.md)"
        required: true

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FILES="${{ inputs.file }}"
          else
            BEFORE="${{ github.event.before }}"
            if [[ "$BEFORE" =~ ^0+$ ]]; then BEFORE="HEAD~1"; fi
            FILES=$(git diff --name-only --diff-filter=A "$BEFORE..${{ github.sha }}" -- 'src/blog/*.md' | tr '\n' ' ')
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "detected: $FILES"

      - if: steps.detect.outputs.files != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - if: steps.detect.outputs.files != ''
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - if: steps.detect.outputs.files != ''
        run: node scripts/send-newsletter.mjs ${{ steps.detect.outputs.files }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          AUDIENCE_ID: ${{ secrets.AUDIENCE_ID }}
          FROM_EMAIL: hello@i7t5.com
